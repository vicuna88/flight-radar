name: Zhengzhou Flight Radar

on:
  workflow_dispatch: # 讓你可以手動點按鈕執行
  schedule:
    - cron: '0 0 * * *' # 每天自動幫你抓一次

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 啟動鄭州機票雷達
        run: node radar.js
