name: Zhengzhou Flight Radar

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      # 注意：我們刪除了 npm run build，這會讓我們跳過所有編譯錯誤
      
      - name: Run Radar
        run: npx tsx src/index.ts
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SKYSCANNER_API_KEY: ${{ secrets.SKYSCANNER_API_KEY }}
          DESTINATION_AIRPORT_CODE: "CGO"
          # 如果程式還缺什麼，直接在這裡補上變數即可，不用改 env.ts 了
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
