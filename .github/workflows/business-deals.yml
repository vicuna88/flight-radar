name: Zhengzhou Flight Radar

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Hard Clean and Build
        run: |
          rm -rf dist
          npm install
          npm run build
        
      - name: Run Radar
        run: npx tsx src/index.ts
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SKYSCANNER_API_KEY: ${{ secrets.SKYSCANNER_API_KEY }}
          DESTINATION_AIRPORT_CODE: "CGO"
